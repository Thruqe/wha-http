root = "."
tmp_dir = ".air"

[build]
cmd = "go build -o .air/wha-http ."
entrypoint = ".air/wha-http"
delay = 500
exclude_dir = ["frontend", ".air", "vendor"]
include_ext = ["go"]
kill_delay = "500ms"
rerun_delay = 500

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
