name: whatsrook

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      WHATSROOK_BIN: /usr/local/bin/whatsrook
      JWT_SECRET: ${JWT_SECRET} # set in .env
    volumes:
      - data:/app/data # persist the SQLite db
    restart: unless-stopped

volumes:
  data:
