name: wha-http-dev

services:
  app:
    image: golang:latest
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
      - go-cache:/root/go/pkg/mod
    ports:
      - "8080:8080" # Go API (Air)
      - "5173:5173" # Vite dev server
    environment:
      RPM_BIN: /usr/local/bin/rpm
      ZEVBOT_BIN: /usr/local/bin/zevBot
      PORT: "8080"
      PATH: "/root/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    command: >
      bash -c "
        air &
        cd frontend && npm run dev -- --host
      "
    restart: unless-stopped

volumes:
  go-cache:
